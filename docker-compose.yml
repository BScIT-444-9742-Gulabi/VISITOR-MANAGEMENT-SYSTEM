version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: vms_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: vms_db
      MYSQL_USER: vms_user
      MYSQL_PASSWORD: vms_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
    networks:
      - vms_network

  # Apache with PHP
  apache:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vms_apache
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
    environment:
      - DB_HOST=mysql
      - DB_NAME=vms_db
      - DB_USER=vms_user
      - DB_PASSWORD=vms_password
    networks:
      - vms_network

  # PhpMyAdmin (Optional - for database management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: vms_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      - mysql
    networks:
      - vms_network

volumes:
  mysql_data:

networks:
  vms_network:
    driver: bridge
